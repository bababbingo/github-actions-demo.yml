name: Build iOS

on: [push]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: Install MAUI
        run: dotnet workload install maui

      - name: Build iOS
        run: dotnet build -f net8.0-ios
